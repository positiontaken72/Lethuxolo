services:
  - type: web
    name: lethuxolo-trading
    runtime: static
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/hear-and-say run build
    staticPublishPath: artifacts/hear-and-say/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
